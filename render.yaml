services:
  - type: web
    name: iwanttobearichguy
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # $PORT 由 Render 動態指定，務必沿用；關掉使用統計與 CORS 讓啟動更乾淨
    startCommand: "streamlit run wealth.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false"
