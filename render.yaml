services:
  - type: web
    name: iwanttobearichguy
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # 先跑 inject_meta.py 注入分享預覽用的 OG meta tags，再啟動 Streamlit
    startCommand: "python inject_meta.py && streamlit run wealth.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false"
